<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="frost" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000003"/>
      <stop offset="38%" stop-color="#000036"/>
      <stop offset="82%" stop-color="#143f79"/>
      <stop offset="100%" stop-color="#496d93"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#frost)"/>
  <!-- Subtle shimmer overlay -->
  <rect width="1200" height="630" fill="url(#shimmer)"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Title -->
  <text x="600" y="270" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="300" fill="white" letter-spacing="-1">DeFi Triangle</text>
  <!-- Paragraph -->
  <text x="600" y="340" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="400" fill="white" fill-opacity="0.65">Your DeFi execution and exposure app.</text>
  <!-- Bottom line -->
  <line x1="540" y1="390" x2="660" y2="390" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Solana badge -->
  <text x="600" y="430" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="white" fill-opacity="0.35" letter-spacing="3">BUILT ON SOLANA</text>
</svg>
