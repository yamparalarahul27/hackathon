name: Security Gates

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review-signal:
    name: Security Signal - Dependency Review (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  runtime-audit-signal:
    name: Security Signal - Runtime Audit High+ (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Audit runtime dependencies
        run: npm run audit:high

  security-signals-summary:
    name: Security Signals Summary
    runs-on: ubuntu-latest
    needs:
      - dependency-review-signal
      - runtime-audit-signal
    if: always()
    steps:
      - name: Summarize advisory results
        run: |
          echo "Dependency review result: ${{ needs.dependency-review-signal.result }}"
          echo "Runtime audit result: ${{ needs.runtime-audit-signal.result }}"
